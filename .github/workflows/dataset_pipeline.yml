name: Dataset Processing Pipeline (Local Self-Hosted)

on:
  push:
    paths:
      - 'preprocess_data/**'
      - '!preprocess_data/.gitkeep'

jobs:
  process-dataset:
    runs-on: self-hosted

    steps:
      - name: Checkout Data Repo
        uses: actions/checkout@v3
        with:
          path: data_repo

      - name: Cleanup and Start Services
        run: |
          echo "Cleaning up old processes on port 8000 and 8001..."
          # This kills any existing uvicorn/python processes to start fresh
          Get-Process | Where-Object { $_.ProcessName -like "*python*" } | Stop-Process -Force -ErrorAction SilentlyContinue

          $apiPath = "c:\Users\vibha\Projects\exe_2\backend\bias_detection_service"
          $llmPath = "c:\Users\vibha\Projects\exe_2\backend\LLM\api"
          $pythonPath = "$apiPath\venv\Scripts\python.exe"

          echo "Starting Bias Detection API (Port 8000)..."
          cd $apiPath
          Start-Process -FilePath $pythonPath -ArgumentList "-m uvicorn app.main:app --host 127.0.0.1 --port 8000"

          echo "Starting LLM Service (Port 8001)..."
          cd $llmPath
          Start-Process -FilePath $pythonPath -ArgumentList "-m uvicorn bias_api:app --host 127.0.0.1 --port 8001"
        shell: pwsh

      - name: Wait for Services
        run: Start-Sleep -s 15
        shell: pwsh

      - name: Process Datasets
        run: |
          $pythonPath = "c:\Users\vibha\Projects\exe_2\backend\bias_detection_service\venv\Scripts\python.exe"
          $scriptPath = "c:\Users\vibha\Projects\exe_2\scripts\dataset_pipeline.py"
          
          # Get absolute path for the data_repo folder
          $currentDir = Get-Location
          $prePath = "$currentDir\data_repo\preprocess_data"
          $postPath = "$currentDir\data_repo\post_processed_data"

          echo "Current Workspace: $currentDir"
          echo "Processing data in: $prePath"

          & $pythonPath $scriptPath --preprocess "$prePath" --postprocess "$postPath" --mode full
        shell: pwsh

      - name: Commit and Push results
        run: |
          cd data_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocess_data/ post_processed_data/
          
          $status = git status --porcelain
          if ($status) {
              git commit -m "Auto-processed datasets (Local Self-Hosted)"
              git push
          } else {
              echo "No changes to commit"
          }
        shell: pwsh
