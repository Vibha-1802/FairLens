name: Dataset Processing Pipeline (External API)

on:
  push:
    paths:
      - 'preprocess_data/**'
      - '!preprocess_data/.gitkeep'

jobs:
  process-dataset:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Data Repo
        uses: actions/checkout@v3
        with:
          path: data_repo

      - name: Checkout API Repo (BiasModel)
        uses: actions/checkout@v3
        with:
          repository: vibha-1802/BiasModel
          path: app_repo


      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r app_repo/requirements.txt
          if [ -f app_repo/backend/bias_detection_service/requirements.txt ]; then
            pip install -r app_repo/backend/bias_detection_service/requirements.txt
          fi

      - name: Start Bias Detection API
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/app_repo/backend/bias_detection_service
          cd app_repo/backend/bias_detection_service
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
        shell: bash

      - name: Wait for API
        run: sleep 10

      - name: Process Datasets
        run: |
          # Use the script from the App Repo to process data in the Data Repo
          python app_repo/scripts/dataset_pipeline.py \
            --preprocess data_repo/preprocess_data \
            --postprocess data_repo/post_processed_data

      - name: Commit and Push changes to Data Repo
        run: |
          cd data_repo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocess_data/ post_processed_data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-processed datasets via BiasModel API"
            git push
          fi
