name: Dataset Processing Pipeline (Local Self-Hosted)

on:
  push:
    paths:
      - 'preprocess_data/**'
      - '!preprocess_data/.gitkeep'

jobs:
  process-dataset:
    runs-on: self-hosted

    steps:
      - name: Checkout Data Repo
        uses: actions/checkout@v4
        with:
          path: data_repo
          token: ${{ secrets.MY_PAT }}

      - name: Process Datasets
        run: |
          # Use your local venv python and script
          $pythonPath = "c:\Users\vibha\Projects\exe_2\backend\bias_detection_service\venv\Scripts\python.exe"
          $scriptPath = "c:\Users\vibha\Projects\exe_2\scripts\dataset_pipeline.py"
          
          $currentDir = Get-Location
          $prePath = "$currentDir\data_repo\preprocess_data"
          $postPath = "$currentDir\data_repo\post_processed_data"

          echo "Processing data in: $prePath"
          & $pythonPath $scriptPath --preprocess "$prePath" --postprocess "$postPath" --mode full
        shell: powershell

      - name: Commit and Push results
        run: |
          cd data_repo
          git config user.name "Vibha-1802"
          git config user.email "vibha.1802@gmail.com"
          
          git add .
          $status = git status --porcelain
          if ($status) {
              git commit -m "Auto-processed datasets (Local Self-Hosted)"
              git push origin HEAD:main
          }
        shell: powershell
