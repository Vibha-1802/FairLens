name: Dataset Processing Pipeline (Local Self-Hosted)

on:
  push:
    paths:
      - 'preprocess_data/**'
      - '!preprocess_data/.gitkeep'

jobs:
  process-dataset:
    # Use your local machine
    runs-on: self-hosted

    steps:
      - name: Checkout Data Repo
        uses: actions/checkout@v3
        with:
          path: data_repo

      - name: Start Services (API & LLM)
        run: |
          echo "Starting Bias Detection API (Port 8000)..."
          cd c:\Users\vibha\Projects\exe_2\backend\bias_detection_service
          Start-Process -FilePath ".\venv\Scripts\python.exe" -ArgumentList "-m uvicorn app.main:app --host 127.0.0.1 --port 8000"

          echo "Starting LLM Service (Port 8001)..."
          # Using the same venv or adjust if LLM has its own
          cd c:\Users\vibha\Projects\exe_2\backend\LLM\api
          Start-Process -FilePath "c:\Users\vibha\Projects\exe_2\backend\bias_detection_service\venv\Scripts\python.exe" -ArgumentList "-m uvicorn bias_api:app --host 127.0.0.1 --port 8001"
        shell: pwsh

      - name: Wait for Services to initialize
        run: Start-Sleep -s 10
        shell: pwsh

      - name: Process Datasets
        run: |
          # Run the pipeline script using the local venv python
          & "c:\Users\vibha\Projects\exe_2\backend\bias_detection_service\venv\Scripts\python.exe" `
            "c:\Users\vibha\Projects\exe_2\scripts\dataset_pipeline.py" `
            --preprocess data_repo/preprocess_data `
            --postprocess data_repo/post_processed_data `
            --mode full
        shell: pwsh

      - name: Commit and Push results to FairLens
        run: |
          cd data_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocess_data/ post_processed_data/
          
          $status = git status --porcelain
          if ($status) {
              git commit -m "Auto-processed datasets (Local Self-Hosted)"
              git push
          } else {
              echo "No changes to commit"
          }
        shell: pwsh
